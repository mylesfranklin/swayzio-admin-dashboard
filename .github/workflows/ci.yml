name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Design system gates
      - name: Lint DESIGN.md (fails on errors; warnings allowed)
        run: npm run design:lint
      - name: Verify generated theme is up to date
        run: npm run design:check

      # Design regression: compare the PR's DESIGN.md against the base branch.
      # `designmd diff` exits 1 if regressions are detected (e.g. a contrast pair
      # that dropped below WCAG AA, or removed tokens).
      - name: Design regression check
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git show "origin/${{ github.base_ref }}:design/swayzio.DESIGN.md" > /tmp/base.DESIGN.md 2>/dev/null \
            || cp design/swayzio.DESIGN.md /tmp/base.DESIGN.md
          npx designmd diff /tmp/base.DESIGN.md design/swayzio.DESIGN.md

      # Type safety
      - name: Typecheck
        run: npm run check

      # NOTE: `next build` is intentionally omitted here — it needs runtime env
      # (DATABASE_URL, STRIPE_SECRET_KEY, Clerk keys) and proxy.ts fails closed in
      # production without them. Add a build job with repository secrets when ready.
